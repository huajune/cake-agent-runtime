name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop
  # 补 workflow_dispatch 触发器：bot 用 GITHUB_TOKEN 创建/更新的 PR 不会触发
  # pull_request 事件（GitHub 反递归设计），但 workflow_dispatch 是该限制的
  # 例外通道，允许从 GITHUB_TOKEN 触发。release-metadata workflow 创建 bot PR
  # 后会 dispatch 本 workflow 并把 pr_number 透传过来。
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review（用于 bot 创建的 PR 无法走 pull_request 事件的兜底）'
        required: true
        type: string

# 同一 PR 的新 run 取消旧 run：synchronize 连续触发时旧 diff 的 review 已过时
concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ai-code-review:
    # release-metadata bot PR 只含脚本生成的版本元数据（package.json / CHANGELOG.md /
    # .release/），AI review 无增量价值，跳过以省时省额度。workflow_dispatch 是
    # 人工兜底通道，不做过滤。
    if: >
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          if gh pr diff "$PR_NUMBER" --name-only | grep -Fxq '.github/workflows/ai-code-review.yml'; then
            WORKFLOW_CHANGED=true
          else
            WORKFLOW_CHANGED=false
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "workflow_changed=$WORKFLOW_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Read review rules
        id: review-rules
        run: |
          {
            echo 'content<<EOF'
            cat .github/review-rules.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Review current HEAD with Claude
        id: review
        uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.workflow_changed != 'true'
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            CURRENT HEAD SHA: ${{ steps.pr.outputs.head_sha }}

            Review only the diff from the merge base with develop to CURRENT HEAD. Prioritize the
            Critical rules below; do not inspect unrelated unchanged files. Use no more than 60 tool
            calls so that you always reserve time to return the required structured result.

            Do not call `gh` and do not submit a GitHub review yourself. Return exactly one JSON
            object matching the configured schema. Set decision to APPROVE when there are no
            Critical findings; otherwise set it to REQUEST_CHANGES. Put a concise explanation in
            summary and list only blocking Critical findings in blocking_findings.

            Review this PR according to the following rules:

            ${{ steps.review-rules.outputs.content }}

          # Claude 只负责分析并返回受约束的结构化结论；下一步使用
          # workflow GITHUB_TOKEN 确定性写回 review，避免依赖 Claude Action
          # 临时 token 的生命周期，也避免模型漏掉最后的 gh 命令。
          # 补齐审查时常用的只读 git 子命令，减少 permission denial 浪费回合。
          claude_args: |
            --max-turns 80
            --json-schema '{"type":"object","properties":{"decision":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"summary":{"type":"string","minLength":1,"maxLength":4000},"blocking_findings":{"type":"array","items":{"type":"string","minLength":1,"maxLength":1000},"maxItems":20}},"required":["decision","summary","blocking_findings"],"additionalProperties":false}'
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git status:*),Bash(git merge-base:*),Bash(git rev-parse:*),Bash(git ls-files:*),Bash(git grep:*),Bash(git cat-file:*),Bash(git branch:*)"

      # 无论 Claude Action 成功、达到 max-turns 或异常退出，都进入确定性处理：
      # - 成功且 structured_output 合法：用 workflow GITHUB_TOKEN 提交裁决；
      # - 失败或输出非法：幂等提交一次 github-actions 阻塞 review，并判红。
      - name: Submit deterministic review or fail closed
        if: always() && steps.pr.outputs.workflow_changed != 'true'
        env:
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
          REVIEW_JSON: ${{ steps.review.outputs.structured_output }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          FALLBACK_PREFIX="Automated AI review did not produce a valid structured decision for HEAD"
          LEGACY_FALLBACK_PREFIX="Automated AI review did not complete a decisive review for HEAD"

          submit_fallback() {
            export GH_TOKEN="$GITHUB_TOKEN"
            EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
              --jq "[.[] | select(.commit_id == \"${HEAD_SHA}\" and .user.login == \"github-actions[bot]\" and .state == \"CHANGES_REQUESTED\" and (.body | startswith(\"${FALLBACK_PREFIX}\")))] | length")
            if [ "$EXISTING" -eq 0 ]; then
              gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
                -f event=REQUEST_CHANGES \
                -f commit_id="$HEAD_SHA" \
                -f body="${FALLBACK_PREFIX} ${HEAD_SHA}. Inspect the workflow run and request a fresh review after remediation."
            fi
            echo "::error::Claude review outcome=${REVIEW_OUTCOME}; no valid structured decision was available for ${HEAD_SHA}."
            exit 1
          }

          if [ "$REVIEW_OUTCOME" != "success" ]; then
            submit_fallback
          fi

          if ! printf '%s' "$REVIEW_JSON" | jq -e \
            '(.decision == "APPROVE" or .decision == "REQUEST_CHANGES") and
             ((.summary | type) == "string") and
             ((.summary | length) > 0 and (.summary | length) <= 4000) and
             ((.blocking_findings | type) == "array") and
             ((.blocking_findings | length) <= 20) and
             (if .decision == "REQUEST_CHANGES"
              then (.blocking_findings | length) > 0
              else (.blocking_findings | length) == 0
              end)' \
            >/dev/null; then
            submit_fallback
          fi

          DECISION=$(printf '%s' "$REVIEW_JSON" | jq -r .decision)
          # Claude Action 偶尔会把内部 XML 结束标签放进 summary 字符串；
          # 输出仍符合 schema，但不应把这些协议噪声写入 GitHub review。
          SUMMARY=$(printf '%s' "$REVIEW_JSON" | jq -r \
            '.summary | gsub("</?(summary|invoke)>"; "") | sub("[\\n[:space:]]+$"; "")')
          FINDINGS=$(printf '%s' "$REVIEW_JSON" | jq -r \
            'if (.blocking_findings | length) == 0 then "" else "\n\nBlocking findings:\n" + (.blocking_findings | map("- " + .) | join("\n")) end')

          export GH_TOKEN="$GITHUB_TOKEN"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
            -f event="$DECISION" \
            -f commit_id="$HEAD_SHA" \
            -f body="${SUMMARY}${FINDINGS}"

          # 有效 Claude 裁决已经产生后，清理本 workflow 历史运行留下的自动阻塞
          # review；只匹配固定文案，避免误撤销人工或其他机器人的 review。
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and .state == \"CHANGES_REQUESTED\" and ((.body | startswith(\"${FALLBACK_PREFIX}\")) or (.body | startswith(\"${LEGACY_FALLBACK_PREFIX}\")))) | .id" |
            while read -r REVIEW_ID; do
              [ -n "$REVIEW_ID" ] || continue
              gh api --method PUT \
                "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/dismissals" \
                -f message="Superseded by a valid structured AI review for ${HEAD_SHA}."
            done

          echo "AI review submitted for ${HEAD_SHA}: ${DECISION}"

      # Anthropic Action 会拒绝运行 PR 自己修改过的 workflow（必须与默认分支完全一致）。
      # 这类改动不能由它安全地自审，保留明确告警并交给仓库的人类审批规则兜底。
      - name: Require human review for AI workflow changes
        if: steps.pr.outputs.workflow_changed == 'true'
        run: |
          echo "::warning::AI review skipped because this PR modifies ai-code-review.yml; human review is required."
