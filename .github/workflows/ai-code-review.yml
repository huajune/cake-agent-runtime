name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop
  # 补 workflow_dispatch 触发器：bot 用 GITHUB_TOKEN 创建/更新的 PR 不会触发
  # pull_request 事件（GitHub 反递归设计），但 workflow_dispatch 是该限制的
  # 例外通道，允许从 GITHUB_TOKEN 触发。release-metadata workflow 创建 bot PR
  # 后会 dispatch 本 workflow 并把 pr_number 透传过来。
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review（用于 bot 创建的 PR 无法走 pull_request 事件的兜底）'
        required: true
        type: string

# 同一 PR 的新 run 取消旧 run：synchronize 连续触发时旧 diff 的 review 已过时
concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ai-code-review:
    # release-metadata bot PR 只含脚本生成的版本元数据（package.json / CHANGELOG.md /
    # .release/），AI review 无增量价值，跳过以省时省额度。workflow_dispatch 是
    # 人工兜底通道，不做过滤。
    if: >
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Read review rules
        id: review-rules
        run: |
          {
            echo 'content<<EOF'
            cat .github/review-rules.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            Review this PR according to the following rules:

            ${{ steps.review-rules.outputs.content }}

          # claude-code-action 默认 classify_inline_comments，行内评论走注入的
          # mcp__github_inline_comment__create_inline_comment 工具（不是 gh pr review）。
          # 缺它则每次落评论都被 allowedTools 拒（run 会绿但 permission_denials 累积、
          # 最终 "No buffered inline comments"，PR 上零评论）。gh pr review/comment 保留：
          # review-rules 仍用它们发整体总结与 approve/request-changes 裁决。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
