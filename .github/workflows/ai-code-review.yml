name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ai-code-review:
    if: >
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/') &&
      !contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Read review rules
        id: review-rules
        run: |
          {
            echo 'content<<EOF'
            cat .github/review-rules.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR according to the following rules:

            ${{ steps.review-rules.outputs.content }}

          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
