name: Update Version and Changelog

on:
  push:
    branches:
      - main
      - master

# 防止并发执行导致分支名冲突
concurrency:
  group: version-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-version-changelog:
    runs-on: ubuntu-latest

    # 避免无限循环：如果是 bot 提交则跳过
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录，用于分析 commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run version and changelog update script
        run: node scripts/update-version-changelog.js
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet package.json CHANGELOG.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "version=unchanged" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 读取新版本号
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create update branch and push
        if: steps.check_changes.outputs.has_changes == 'true'
        id: create_branch
        run: |
          VERSION="${{ steps.check_changes.outputs.version }}"
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="chore/update-version-$VERSION-$TIMESTAMP"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # 创建新分支
          git checkout -b "$BRANCH_NAME"

          # 提交变更
          git add package.json CHANGELOG.md
          git commit -m "chore: update version to $VERSION and changelog [skip ci]"

          # 推送到远程（如果分支已存在，强制推送）
          git push origin "$BRANCH_NAME" || git push -f origin "$BRANCH_NAME"

          echo "✅ 已创建分支: $BRANCH_NAME"

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY_TEMPLATE: >
            ## 📦 自动版本更新

            **新版本**: v${{ steps.check_changes.outputs.version }}

            此PR由GitHub Actions自动创建，包含：
            - ✅ 更新 package.json 版本号
            - ✅ 更新 CHANGELOG.md

            ### 变更来源
            基于 `${{ github.ref_name }}` 分支的commit历史自动生成。

            ### 合并后操作
            合并此PR后，建议：
            1. 创建git tag: `v${{ steps.check_changes.outputs.version }}`
            2. 发布GitHub Release

            ---
            🤖 由 GitHub Actions 自动生成
        run: |
          VERSION="${{ steps.check_changes.outputs.version }}"
          BRANCH_NAME="${{ steps.create_branch.outputs.branch_name }}"
          CURRENT_BRANCH="${{ github.ref_name }}"
          PR_BODY="$PR_BODY_TEMPLATE"

          # 使用gh CLI创建PR
          gh pr create \
            --base "$CURRENT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore: update version to $VERSION" \
            --body "$PR_BODY" \
            --label "automated,version-update"

          echo "✅ 已创建PR: $BRANCH_NAME -> $CURRENT_BRANCH"

      - name: Sync version changes to develop
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.check_changes.outputs.version }}"
          BRANCH_NAME="${{ steps.create_branch.outputs.branch_name }}"

          # 切回版本更新分支（包含 package.json + CHANGELOG.md 变更）
          git checkout "$BRANCH_NAME"

          # 合并到 develop
          git fetch origin develop
          git checkout develop
          git merge "$BRANCH_NAME" --no-edit -m "chore: sync version $VERSION to develop [skip ci]"
          git push origin develop

          echo "✅ 已同步版本变更到 develop"
