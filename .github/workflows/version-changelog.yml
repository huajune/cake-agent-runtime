name: Release Metadata Automation

on:
  pull_request_target:
    types: [closed]
    branches:
      - develop
      - master

concurrency:
  group: release-metadata-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  prepare-develop-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'develop' &&
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/') &&
      !startsWith(github.event.pull_request.title, 'chore(release): 更新待发布版本信息') &&
      !contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update develop release metadata PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED_PR_TITLE: ${{ github.event.pull_request.title }}
          MERGED_PR_BODY: ${{ github.event.pull_request.body }}
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          set -euo pipefail

          BASE_BRANCH="develop"
          BOT_BRANCH="chore/release-metadata/develop"
          SOURCE_PR_NUMBER="${{ github.event.pull_request.number }}"
          MERGED_PR_FILES="$(gh pr view "${SOURCE_PR_NUMBER}" --json files --jq '.files[].path' 2>/dev/null || true)"
          export MERGED_PR_FILES

          git fetch origin "${BASE_BRANCH}"
          git checkout -B "${BOT_BRANCH}" "origin/${BASE_BRANCH}"

          node scripts/update-version-changelog.js prepare

          if git diff --quiet package.json CHANGELOG.md .release/pending-release.json; then
            echo "ℹ️ develop 的版本元数据无变化，跳过 PR 更新"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")

          git add package.json CHANGELOG.md .release/pending-release.json
          git commit -m "chore(release): 更新待发布版本信息 [skip ci]"
          git push --force-with-lease origin "HEAD:${BOT_BRANCH}"

          PR_TITLE="chore(release): 更新待发布版本信息（v${VERSION}）"
          PR_BODY=$(cat <<EOF
          <!-- release-metadata-pr -->
          ## 说明

          此 PR 由 GitHub Actions 自动创建，用于更新 \`develop\` 上的待发布版本信息。

          - 触发来源: #${SOURCE_PR_NUMBER}
          - 目标分支: \`${BASE_BRANCH}\`
          - 预计版本: \`v${VERSION}\`
          - 更新文件:
            - \`package.json\`
            - \`CHANGELOG.md\`
            - \`.release/pending-release.json\`
          EOF
          )

          EXISTING_PR_NUMBER=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "✅ 已更新 develop 版本元数据 PR: #${EXISTING_PR_NUMBER}"
            exit 0
          fi

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"

      - name: Reminder for branch protection
        run: |
          echo "ℹ️ 如果 develop 开启严格分支保护，请合并机器人创建的版本元数据 PR，而不是依赖工作流直推。"

  finalize-master-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/') &&
      !startsWith(github.event.pull_request.title, 'chore(release): 固化正式版本记录') &&
      !contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update master release finalize PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE_BRANCH="master"
          BOT_BRANCH="chore/release-metadata/master"
          SOURCE_PR_NUMBER="${{ github.event.pull_request.number }}"

          git fetch origin "${BASE_BRANCH}"
          git checkout -B "${BOT_BRANCH}" "origin/${BASE_BRANCH}"

          node scripts/update-version-changelog.js finalize

          if git diff --quiet package.json CHANGELOG.md .release/pending-release.json; then
            echo "ℹ️ master 的正式发布记录无变化，跳过 PR 更新"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")

          git add package.json CHANGELOG.md .release/pending-release.json
          git commit -m "chore(release): 固化正式版本记录 [skip ci]"
          git push --force-with-lease origin "HEAD:${BOT_BRANCH}"

          PR_TITLE="chore(release): 固化正式版本记录（v${VERSION}）"
          PR_BODY=$(cat <<EOF
          <!-- release-metadata-pr -->
          ## 说明

          此 PR 由 GitHub Actions 自动创建，用于将 \`master\` 上的待发布记录固化为正式版本。

          - 触发来源: #${SOURCE_PR_NUMBER}
          - 目标分支: \`${BASE_BRANCH}\`
          - 发布版本: \`v${VERSION}\`
          - 合并后动作:
            - 创建 Git Tag
            - 创建 GitHub Release
            - 触发部署工作流
          EOF
          )

          EXISTING_PR_NUMBER=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "✅ 已更新 master 发布固化 PR: #${EXISTING_PR_NUMBER}"
            exit 0
          fi

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"

  publish-master-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'chore/release-metadata/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        id: release_tag
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "ℹ️ Tag already exists: ${TAG_NAME}"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release_tag.outputs.version }}"
          TAG_NAME="${{ steps.release_tag.outputs.tag_name }}"

          node scripts/get-release-notes.js "${VERSION}" > /tmp/release_notes.md

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file /tmp/release_notes.md
            echo "✅ GitHub Release notes updated: ${TAG_NAME}"
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file /tmp/release_notes.md

      - name: Trigger deploy workflow
        if: steps.release_tag.outputs.tag_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh workflow run deploy.yml \
            --ref master \
            -f release_tag="${RELEASE_TAG}"
