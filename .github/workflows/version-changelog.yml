name: Release Metadata Automation

on:
  pull_request_target:
    types: [closed]
    branches:
      - develop
      - master
  workflow_dispatch:
    inputs:
      pr_number:
        description: '单个已合并到 develop 的 PR 号，例如 224'
        required: false
        type: string
      from_pr:
        description: '补偿区间起始 PR 号，例如 220'
        required: false
        type: string
      to_pr:
        description: '补偿区间结束 PR 号，例如 224'
        required: false
        type: string

concurrency:
  group: release-metadata-${{ github.event.pull_request.base.ref || 'manual' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-develop-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'develop' &&
        !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/') &&
        !startsWith(github.event.pull_request.title, 'chore(release): 更新待发布版本信息') &&
        !contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # 需要 actions:write 才能用 gh workflow run 派发 ai-code-review.yml；
      # 详见本文件末尾"为 bot PR 触发 AI Code Review" step。
      actions: write
      id-token: write
    steps:
      - name: Checkout develop
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect merged PR contexts
        id: merged_pr_contexts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_EVENT: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number || '' }}
          INPUT_FROM_PR: ${{ inputs.from_pr || '' }}
          INPUT_TO_PR: ${{ inputs.to_pr || '' }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_EVENT}" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_PR_NUMBER}" ]; then
              PR_NUMBERS="${INPUT_PR_NUMBER}"
            elif [ -n "${INPUT_FROM_PR}" ] && [ -n "${INPUT_TO_PR}" ]; then
              PR_NUMBERS="$(seq "${INPUT_FROM_PR}" "${INPUT_TO_PR}" | tr '\n' ' ')"
            else
              echo "❌ workflow_dispatch 需要填写 pr_number，或同时填写 from_pr/to_pr"
              exit 1
            fi
          else
            PR_NUMBERS="${EVENT_PR_NUMBER}"
          fi

          node scripts/collect-merged-pr-contexts.js ${PR_NUMBERS}

          {
            echo 'numbers<<EOF'
            cat .release/merged-pr-numbers.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes with Claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read `.release/merged-pr-contexts.json` and generate concise release-note JSON files.

            For each item in `.release/merged-pr-contexts.json`, write exactly one UTF-8 JSON object to:
            `.release/llm-release-entry-<PR_NUMBER>.json`

            Each JSON object must have these keys:
            {
              "businessUpdates": [],
              "summary": [],
              "features": [],
              "fixes": [],
              "optimizations": [],
              "ops": [],
              "config": [],
              "verification": []
            }

            Rules:
            - Only use facts from the PR title, PR body, commits, and changed files in `.release/merged-pr-contexts.json`.
            - `businessUpdates` is shown directly in the Feishu deploy card under "业务改动（候选人/运营可感知）"; cover every candidate/operator-visible commit there.
            - `features` and `fixes` should still be categorized for CHANGELOG details.
            - Prefer business-facing Chinese. Keep necessary identifiers such as Vision, Agent, Dashboard, reply-fact-guard, payload.artworkUrl.
            - Do not include PR numbers, author names, file paths, test commands, Markdown headings, or "无/暂无".
            - Put CI/CD, alert routing, deploy flow, and release-process changes in `ops`.
            - Put environment/config changes in `config`.
            - If unsure about a section, use an empty array.
            - Do not edit any other file.
          claude_args: |
            --allowedTools "Read,Write"

      - name: Create or update develop release metadata PR
        id: bot_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_METADATA_PR_NUMBERS: ${{ steps.merged_pr_contexts.outputs.numbers }}
          RELEASE_NOTES_LLM_ENABLED: ${{ vars.RELEASE_NOTES_LLM_ENABLED || 'true' }}
          RELEASE_NOTES_LLM_MODEL: ${{ vars.RELEASE_NOTES_LLM_MODEL || vars.AGENT_EXTRACT_MODEL || 'gpt-5-mini' }}
          RELEASE_NOTES_LLM_BASE_URL: ${{ secrets.RELEASE_NOTES_LLM_BASE_URL || secrets.OPENAI_BASE_URL || vars.RELEASE_NOTES_LLM_BASE_URL || vars.OPENAI_BASE_URL }}
          RELEASE_NOTES_LLM_API_KEY: ${{ secrets.RELEASE_NOTES_LLM_API_KEY || secrets.ANTHROPIC_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          BASE_BRANCH="develop"
          BOT_BRANCH="chore/release-metadata/develop"

          git fetch origin "${BASE_BRANCH}"
          git checkout -B "${BOT_BRANCH}" "origin/${BASE_BRANCH}"

          # 分支每轮都从 develop 重建。若该分支上还挂着未合并的元数据 PR，
          # 不先恢复其元数据文件的话，已累计的条目会被本轮覆盖丢失
          # （v5.13.1 发版时 #270/#271 的条目就这样丢过两次，靠手工补录）。
          # update-version-changelog.js 内部按 PR 号 upsert，恢复后重复处理是幂等的。
          EXISTING_OPEN_PR=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          if [ -n "${EXISTING_OPEN_PR}" ] && git fetch origin "${BOT_BRANCH}"; then
            git checkout FETCH_HEAD -- package.json CHANGELOG.md .release/pending-release.json
            echo "ℹ️ 已从未合并的元数据 PR #${EXISTING_OPEN_PR} 恢复累计条目"
          fi

          while IFS= read -r SOURCE_PR_NUMBER; do
            [ -n "${SOURCE_PR_NUMBER}" ] || continue
            MERGED_PR_CONTEXT_FILE=".release/merged-pr-context-${SOURCE_PR_NUMBER}.json" \
              RELEASE_NOTES_LLM_ENTRY_FILE=".release/llm-release-entry-${SOURCE_PR_NUMBER}.json" \
              node scripts/update-version-changelog.js prepare
          done <<< "${RELEASE_METADATA_PR_NUMBERS}"

          if git diff --quiet package.json CHANGELOG.md .release/pending-release.json; then
            echo "ℹ️ develop 的版本元数据无变化，跳过 PR 更新"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          SOURCE_PR_LABEL="$(printf '%s\n' "${RELEASE_METADATA_PR_NUMBERS}" | sed '/^$/d' | awk '{printf "%s#%s", sep, $1; sep=", "}')"

          git add package.json CHANGELOG.md .release/pending-release.json
          git commit -m "chore(release): 更新待发布版本信息 [skip ci]"
          # 不依赖 checkout 持久化的凭证：上游 claude-code-action（OIDC 模式）会
          # 覆写本地 git 凭证，workflow_dispatch 补偿模式实测 push 报
          # "Invalid username or token"（2026-06-10）。显式带 GH_TOKEN 推送。
          git push --force-with-lease \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${BOT_BRANCH}"

          PR_TITLE="chore(release): 更新待发布版本信息（v${VERSION}）"
          PR_BODY=$(cat <<EOF
          <!-- release-metadata-pr -->
          ## 说明

          此 PR 由 GitHub Actions 自动创建，用于更新 \`develop\` 上的待发布版本信息。

          - 触发来源: ${SOURCE_PR_LABEL:-manual}
          - 目标分支: \`${BASE_BRANCH}\`
          - 预计版本: \`v${VERSION}\`
          - 更新文件:
            - \`package.json\`
            - \`CHANGELOG.md\`
            - \`.release/pending-release.json\`
          EOF
          )

          EXISTING_PR_NUMBER=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "✅ 已更新 develop 版本元数据 PR: #${EXISTING_PR_NUMBER}"
            echo "pr_number=${EXISTING_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}")
          NEW_PR_NUMBER="${PR_URL##*/}"
          echo "✅ 已创建 develop 版本元数据 PR: #${NEW_PR_NUMBER}"
          echo "pr_number=${NEW_PR_NUMBER}" >> "$GITHUB_OUTPUT"

      # bot 用 GITHUB_TOKEN 创建/更新的 PR 不会触发 ai-code-review.yml 的
      # pull_request 事件（GitHub 反递归设计）。workflow_dispatch 是该限制
      # 的例外通道，允许从 GITHUB_TOKEN 派发，所以这里把刚处理的 bot PR 号
      # 透传给 ai-code-review.yml 让它跑起来。
      - name: Dispatch AI Code Review for bot PR
        if: steps.bot_pr.outputs.pr_number != ''
        # AI review 失败不应阻塞元数据 PR 流程本身（PR 已经创建成功了）。
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.bot_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh workflow run ai-code-review.yml \
            --ref develop \
            -f pr_number="${PR_NUMBER}"
          echo "🚀 已派发 ai-code-review.yml 给 PR #${PR_NUMBER}"

      # required check "CI Checks"（ci.yml）同样不会被 bot push 触发，导致 bot PR
      # 永远满足不了分支保护（v5.13.1 发版只能人工 close/reopen 触发）。
      # 注意必须 --ref 到 bot 分支：check run 挂在所派发 ref 的 head SHA 上，
      # 派发到 develop 的话检查不会出现在 PR 上。
      - name: Dispatch CI Checks for bot PR
        if: steps.bot_pr.outputs.pr_number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run ci.yml --ref chore/release-metadata/develop
          echo "🚀 已在 bot 分支上派发 ci.yml"

      - name: Reminder for branch protection
        run: |
          echo "ℹ️ 如果 develop 开启严格分支保护，请合并机器人创建的版本元数据 PR，而不是依赖工作流直推。"

  create-release-pr:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'develop' &&
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/sync-master-to-develop-') &&
      (
        github.event.pull_request.head.ref == 'chore/release-metadata/develop' ||
        startsWith(github.event.pull_request.title, 'chore(release): 更新待发布版本信息') ||
        contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout develop
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: develop
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/create-release-pr.js --base master --head develop

  finalize-master-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      !startsWith(github.event.pull_request.head.ref, 'chore/release-metadata/') &&
      !startsWith(github.event.pull_request.title, 'chore(release): 固化正式版本记录') &&
      !contains(format('{0}', github.event.pull_request.body), '<!-- release-metadata-pr -->')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # gh workflow run ci.yml 需要 actions:write
      actions: write
    steps:
      - name: Checkout master
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update master release finalize PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE_BRANCH="master"
          BOT_BRANCH="chore/release-metadata/master"
          SOURCE_PR_NUMBER="${{ github.event.pull_request.number }}"

          git fetch origin "${BASE_BRANCH}"
          git checkout -B "${BOT_BRANCH}" "origin/${BASE_BRANCH}"

          node scripts/update-version-changelog.js finalize

          if git diff --quiet package.json CHANGELOG.md .release/pending-release.json; then
            echo "ℹ️ master 的正式发布记录无变化，跳过 PR 更新"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")

          git add package.json CHANGELOG.md .release/pending-release.json
          git commit -m "chore(release): 固化正式版本记录 [skip ci]"
          git push --force-with-lease origin "HEAD:${BOT_BRANCH}"

          PR_TITLE="chore(release): 固化正式版本记录（v${VERSION}）"
          PR_BODY=$(cat <<EOF
          <!-- release-metadata-pr -->
          ## 说明

          此 PR 由 GitHub Actions 自动创建，用于将 \`master\` 上的待发布记录固化为正式版本。

          - 触发来源: #${SOURCE_PR_NUMBER}
          - 目标分支: \`${BASE_BRANCH}\`
          - 发布版本: \`v${VERSION}\`
          - ⚠️ 合并方式: master 要求线性历史，请使用 **Squash and merge**（merge commit 会被拒绝）
          - 合并后动作:
            - 创建 Git Tag
            - 创建 GitHub Release
            - 触发部署工作流
          EOF
          )

          EXISTING_PR_NUMBER=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "✅ 已更新 master 发布固化 PR: #${EXISTING_PR_NUMBER}"
          else
            gh pr create \
              --base "${BASE_BRANCH}" \
              --head "${BOT_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}"
          fi

          # bot push 不触发 pull_request 事件，主动在 bot 分支上派发 required check。
          # ci.yml 的 workflow_dispatch 触发器需已存在于该分支（随发版进入 master 后生效）。
          gh workflow run ci.yml --ref "${BOT_BRANCH}" || \
            echo "⚠️ ci.yml 派发失败（分支上可能还没有 workflow_dispatch 触发器），需人工 close/reopen 触发 CI"

  publish-master-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'chore/release-metadata/master'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
      version: ${{ steps.release_tag.outputs.version }}
    steps:
      - name: Checkout master
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        id: release_tag
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "ℹ️ Tag already exists: ${TAG_NAME}"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release_tag.outputs.version }}"
          TAG_NAME="${{ steps.release_tag.outputs.tag_name }}"

          node scripts/get-release-notes.js "${VERSION}" > /tmp/release_notes.md

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file /tmp/release_notes.md
            echo "✅ GitHub Release notes updated: ${TAG_NAME}"
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file /tmp/release_notes.md
          echo "release_ready=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy workflow
        if: steps.github_release.outputs.release_ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh workflow run deploy.yml \
            --ref master \
            -f release_tag="${RELEASE_TAG}"

  sync-master-back-to-develop:
    needs: publish-master-release
    if: >
      needs.publish-master-release.result == 'success' &&
      needs.publish-master-release.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # gh workflow run ci.yml 需要 actions:write
      actions: write
    steps:
      - name: Checkout develop
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update master back-sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish-master-release.outputs.version }}
        run: |
          set -euo pipefail

          BASE_BRANCH="develop"
          SOURCE_BRANCH="master"
          BOT_BRANCH="chore/release-metadata/sync-master-to-develop-v${VERSION}"

          git fetch origin "${BASE_BRANCH}" "${SOURCE_BRANCH}" --tags
          git checkout -B "${BOT_BRANCH}" "origin/${BASE_BRANCH}"

          set +e
          git merge --no-ff --no-commit "origin/${SOURCE_BRANCH}"
          MERGE_STATUS=$?
          set -e

          if [ "${MERGE_STATUS}" -ne 0 ]; then
            CONFLICTS="$(git diff --name-only --diff-filter=U)"
            if [ -z "${CONFLICTS}" ]; then
              echo "❌ master → develop merge failed without listed conflicts"
              exit "${MERGE_STATUS}"
            fi

            ALLOWED_CONFLICTS=".release/pending-release.json CHANGELOG.md package.json pnpm-lock.yaml"
            for file in ${CONFLICTS}; do
              case " ${ALLOWED_CONFLICTS} " in
                *" ${file} "*)
                  echo "ℹ️ Resolving expected release metadata conflict with develop version: ${file}"
                  git checkout --ours -- "${file}"
                  git add "${file}"
                  ;;
                *)
                  echo "❌ Unexpected conflict while syncing master into develop: ${file}"
                  git merge --abort || true
                  exit 1
                  ;;
              esac
            done
          fi

          node scripts/update-version-changelog.js prepare
          git add package.json CHANGELOG.md .release/pending-release.json

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null && \
             git diff --quiet && \
             git diff --cached --quiet; then
            echo "ℹ️ develop already contains master; no sync PR needed"
            exit 0
          fi

          git commit -m "chore(release): sync master into develop after v${VERSION}"
          git push --force-with-lease origin "HEAD:${BOT_BRANCH}"

          PR_TITLE="chore(release): sync master into develop after v${VERSION}"
          PR_BODY=$(cat <<EOF
          <!-- release-metadata-pr -->
          ## 说明

          此 PR 由 GitHub Actions 自动创建，用于在 \`master\` 发布固化后把发布历史同步回 \`develop\`。

          - 触发版本: \`v${VERSION}\`
          - 目标分支: \`${BASE_BRANCH}\`
          - 来源分支: \`${SOURCE_BRANCH}\`
          - 目的: 避免下一次 \`develop → master\` 发版 PR 因 \`CHANGELOG.md\` / \`.release/pending-release.json\` 等版本元数据文件重复冲突
          EOF
          )

          EXISTING_PR_NUMBER=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${BOT_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "✅ 已更新 master → develop 同步 PR: #${EXISTING_PR_NUMBER}"
          else
            PR_URL=$(gh pr create \
              --base "${BASE_BRANCH}" \
              --head "${BOT_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}")
            NEW_PR_NUMBER="${PR_URL##*/}"
            echo "✅ 已创建 master → develop 同步 PR: #${NEW_PR_NUMBER}"
          fi

          # bot push 不触发 pull_request 事件，主动在 bot 分支上派发 required check
          gh workflow run ci.yml --ref "${BOT_BRANCH}" || \
            echo "⚠️ ci.yml 派发失败（分支上可能还没有 workflow_dispatch 触发器），需人工 close/reopen 触发 CI"
