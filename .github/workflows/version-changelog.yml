name: Update Version and Changelog

on:
  push:
    branches:
      - main
      - master

# 防止并发执行导致分支名冲突
concurrency:
  group: version-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-version-changelog:
    runs-on: ubuntu-latest

    # 避免无限循环：如果是 bot 提交则跳过
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0 # 获取完整历史记录，用于分析 commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run version and changelog update script
        run: node scripts/update-version-changelog.js
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet package.json CHANGELOG.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "version=unchanged" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 读取新版本号
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Commit release changes to master
        if: steps.check_changes.outputs.has_changes == 'true'
        id: release_commit
        run: |
          set -euo pipefail
          VERSION="${{ steps.check_changes.outputs.version }}"
          CURRENT_BRANCH="${{ github.ref_name }}"
          TAG_NAME="v$VERSION"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME" >&2
            exit 1
          fi

          git add package.json CHANGELOG.md
          git commit -m "chore(release): bump version to $VERSION [skip ci]"
          git push origin "HEAD:$CURRENT_BRANCH"

          RELEASE_COMMIT=$(git rev-parse HEAD)
          echo "release_commit=$RELEASE_COMMIT" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "✅ 已推送 release commit 到 ${CURRENT_BRANCH}: ${RELEASE_COMMIT}"

      - name: Sync release commit to develop
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.check_changes.outputs.version }}"
          RELEASE_COMMIT="${{ steps.release_commit.outputs.release_commit }}"

          git fetch origin develop
          git checkout -B develop-sync origin/develop

          if ! git cherry-pick -x "$RELEASE_COMMIT"; then
            git cherry-pick --abort || true
            echo "Failed to cherry-pick release commit into develop" >&2
            exit 1
          fi

          git push origin HEAD:develop

          echo "✅ 已同步版本变更到 develop: $VERSION"

      - name: Create and push release tag
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.release_commit.outputs.tag_name }}"
          RELEASE_COMMIT="${{ steps.release_commit.outputs.release_commit }}"

          git checkout --detach "$RELEASE_COMMIT"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" "$RELEASE_COMMIT"
          git push origin "$TAG_NAME"

          echo "✅ 已推送 release tag: $TAG_NAME"

      - name: Create GitHub Release
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_changes.outputs.version }}"
          TAG_NAME="${{ steps.release_commit.outputs.tag_name }}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "ℹ️ GitHub Release already exists: $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "Automated release for version $VERSION"

          echo "✅ 已创建 GitHub Release: $TAG_NAME"
