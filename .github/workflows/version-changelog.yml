name: Update Version and Changelog

on:
  push:
    branches:
      - master

# 防止并发执行导致分支名冲突
concurrency:
  group: version-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-version-changelog:
    runs-on: ubuntu-latest

    # 避免无限循环：如果是 bot 提交则跳过
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0 # 获取完整历史记录，用于分析 commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run version and changelog update script
        run: node scripts/update-version-changelog.js
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet package.json CHANGELOG.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "version=unchanged" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 读取新版本号
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Commit release changes to master
        if: steps.check_changes.outputs.has_changes == 'true'
        id: release_commit
        run: |
          set -euo pipefail
          VERSION="${{ steps.check_changes.outputs.version }}"
          CURRENT_BRANCH="${{ github.ref_name }}"
          TAG_NAME="v$VERSION"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME" >&2
            exit 1
          fi

          git add package.json CHANGELOG.md
          git commit -m "chore(release): bump version to $VERSION [skip ci]"
          git push origin "HEAD:$CURRENT_BRANCH"

          RELEASE_COMMIT=$(git rev-parse HEAD)
          echo "release_commit=$RELEASE_COMMIT" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "✅ 已推送 release commit 到 ${CURRENT_BRANCH}: ${RELEASE_COMMIT}"

      - name: Create develop sync PR
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.check_changes.outputs.version }}"
          RELEASE_COMMIT="${{ steps.release_commit.outputs.release_commit }}"
          CURRENT_BRANCH="${{ github.ref_name }}"
          SYNC_BRANCH="chore/release-sync-develop-v$VERSION"
          COMMIT_MESSAGE="chore(release): sync version files from $CURRENT_BRANCH for v$VERSION [skip ci]"
          PR_TITLE="chore(release): sync version files to develop for v$VERSION"
          PR_BODY=$(cat <<EOF
          ## 自动同步版本文件到 develop

          此 PR 由 GitHub Actions 自动创建，用于将 \`$CURRENT_BRANCH\` 上 release commit 生成的版本文件同步到 \`develop\`。

          - 版本: \`v$VERSION\`
          - 来源分支: \`$CURRENT_BRANCH\`
          - release commit: \`$RELEASE_COMMIT\`
          - 同步文件:
            - \`package.json\`
            - \`CHANGELOG.md\`
          EOF
          )

          git fetch origin develop
          git checkout -B "$SYNC_BRANCH" origin/develop

          # 仅同步 release 生成的版本文件，避免 develop 在这些文件上的分支差异导致 cherry-pick 冲突。
          git restore --source="$RELEASE_COMMIT" --staged --worktree -- package.json CHANGELOG.md

          if git diff --cached --quiet -- package.json CHANGELOG.md; then
            echo "ℹ️ develop 已包含 v$VERSION 的版本文件，跳过同步 PR 创建"
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push --force-with-lease origin "HEAD:$SYNC_BRANCH"

          EXISTING_PR_NUMBER=$(gh pr list \
            --base develop \
            --head "$SYNC_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "$EXISTING_PR_NUMBER" ]; then
            gh pr edit "$EXISTING_PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
            EXISTING_PR_URL=$(gh pr view "$EXISTING_PR_NUMBER" --json url --jq '.url')
            echo "✅ 已更新 develop 同步 PR: $EXISTING_PR_URL"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --base develop \
            --head "$SYNC_BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY")

          echo "✅ 已创建 develop 同步 PR: $PR_URL"

      - name: Create and push release tag
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.release_commit.outputs.tag_name }}"
          RELEASE_COMMIT="${{ steps.release_commit.outputs.release_commit }}"

          git checkout --detach "$RELEASE_COMMIT"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" "$RELEASE_COMMIT"
          git push origin "$TAG_NAME"

          echo "✅ 已推送 release tag: $TAG_NAME"

      - name: Create GitHub Release
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_changes.outputs.version }}"
          TAG_NAME="${{ steps.release_commit.outputs.tag_name }}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "ℹ️ GitHub Release already exists: $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "Automated release for version $VERSION"

          echo "✅ 已创建 GitHub Release: $TAG_NAME"
