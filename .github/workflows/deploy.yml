name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  # 1. 先跑测试，防止坏代码直接上线
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

  # 2. 服务器上拉取源码并构建部署
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /data/cake

            # 备份当前镜像用于回滚
            if docker images cake-agent-runtime:latest --format '{{.ID}}' | grep -q .; then
              docker tag cake-agent-runtime:latest cake-agent-runtime:previous
              echo "Backed up current image as cake-agent-runtime:previous"
            fi

            # 拉取最新代码
            if [ -d source/.git ]; then
              cd source && git fetch --depth 1 origin master && git reset --hard origin/master && cd ..
            else
              rm -rf source
              git clone --depth 1 --branch master https://github.com/${{ github.repository }}.git source
            fi

            # 同步部署配置（保持 docker-compose.yml 与代码一致）
            cp source/docker-compose.yml docker-compose.yml

            # 在服务器上构建镜像
            docker build -t cake-agent-runtime:latest ./source

            # 启动新容器
            docker compose up -d

            # 健康检查（最多等 60 秒）
            HEALTH_PORT=$(grep -E '^PORT=' .env.prod 2>/dev/null | cut -d= -f2 || echo 8585)
            echo "Waiting for health check on port ${HEALTH_PORT}..."
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf "http://localhost:${HEALTH_PORT}/agent/health" | grep -q '"status":"healthy"'; then
                HEALTHY=true
                echo "Health check passed after $((i*5))s"
                break
              fi
              echo "Attempt $i/12: not healthy yet..."
            done

            if [ "$HEALTHY" = false ]; then
              echo "Health check failed! Rolling back..."
              if docker images cake-agent-runtime:previous --format '{{.ID}}' | grep -q .; then
                docker tag cake-agent-runtime:previous cake-agent-runtime:latest
                docker compose up -d
                echo "Rolled back to previous version"
              fi
              exit 1
            fi

            # 部署成功，清理旧镜像
            docker rmi cake-agent-runtime:previous 2>/dev/null || true
            docker image prune -f
            echo "Deploy successful!"

  # 3. 飞书通知
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_DEPLOY_WEBHOOK_URL }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="✅ 部署成功"
            COLOR="green"
            CONTENT="提交 ${SHORT_SHA} 已部署到生产服务器"
          else
            TITLE="❌ 部署失败"
            COLOR="red"
            CONTENT="提交 ${SHORT_SHA} 部署失败，请检查 GitHub Actions 日志"
          fi

          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": { \"tag\": \"plain_text\", \"content\": \"${TITLE}\" },
                  \"template\": \"${COLOR}\"
                },
                \"elements\": [
                  {
                    \"tag\": \"div\",
                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**项目**: ${{ github.repository }}\n**分支**: ${{ github.ref_name }}\n**提交**: [${SHORT_SHA}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**${CONTENT}**\n\n[查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
                    }
                  }
                ]
              }
            }"
