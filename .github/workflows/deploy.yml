name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. 先跑测试，防止坏代码直接上线
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Build frontend (validation only)
        run: pnpm run build:web
        env:
          # This artifact is discarded; production deploy rebuilds from the release tag
          # with the real API_GUARD_TOKEN on the target server.
          API_GUARD_TOKEN: ci-placeholder-token

      - name: Build backend
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

  # 2. 服务器上拉取源码并构建部署
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="cake-agent-runtime"
            RELEASE_TAG="${{ github.ref_name }}"
            IMAGE_TAG="$RELEASE_TAG"
            cd /data/cake

            if [ -d source/.git ]; then
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            else
              rm -rf source
              git clone --depth 1 https://github.com/${{ github.repository }}.git source
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            fi

            API_GUARD_TOKEN="$(sed -n 's/^API_GUARD_TOKEN=//p' .env.production | head -n1)"
            if [ -z "$API_GUARD_TOKEN" ]; then
              echo "API_GUARD_TOKEN not found in /data/cake/.env.production"
              exit 1
            fi

            chmod +x source/scripts/deploy-remote.sh
            source/scripts/deploy-remote.sh \
              --mode build \
              --image-name "$IMAGE_NAME" \
              --image-tag "$IMAGE_TAG" \
              --workdir /data/cake \
              --compose-source /data/cake/source/docker-compose.yml \
              --source-dir /data/cake/source \
              --api-guard-token "$API_GUARD_TOKEN"

  # 3. 飞书通知
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_DEPLOY_WEBHOOK_URL }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RELEASE_TAG="${{ github.ref_name }}"

          if [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="✅ 部署成功"
            COLOR="green"
            CONTENT="版本 ${RELEASE_TAG}（${SHORT_SHA}）已部署到生产服务器"
          else
            TITLE="❌ 部署失败"
            COLOR="red"
            CONTENT="版本 ${RELEASE_TAG}（${SHORT_SHA}）部署失败，请检查 GitHub Actions 日志"
          fi

          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": { \"tag\": \"plain_text\", \"content\": \"${TITLE}\" },
                  \"template\": \"${COLOR}\"
                },
                \"elements\": [
                  {
                    \"tag\": \"div\",
                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**项目**: ${{ github.repository }}\n**分支**: ${{ github.ref_name }}\n**提交**: [${SHORT_SHA}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**${CONTENT}**\n\n[查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
                    }
                  }
                ]
              }
            }"
