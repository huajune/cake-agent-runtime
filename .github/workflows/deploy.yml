name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. 先跑测试，防止坏代码直接上线
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Build frontend (validation only)
        run: pnpm run build:web
        env:
          # This artifact is discarded; production deploy rebuilds from the release tag
          # with the real API_GUARD_TOKEN on the target server.
          API_GUARD_TOKEN: ci-placeholder-token

      - name: Build backend
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

  # 2. 服务器上拉取源码并构建部署
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="cake-agent-runtime"
            RELEASE_TAG="${{ github.ref_name }}"
            IMAGE_TAG="$RELEASE_TAG"
            cd /data/cake

            if [ -d source/.git ]; then
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            else
              rm -rf source
              git clone --depth 1 https://github.com/${{ github.repository }}.git source
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            fi

            API_GUARD_TOKEN="$(sed -n 's/^API_GUARD_TOKEN=//p' .env.production | head -n1)"
            NEXT_PUBLIC_SUPABASE_URL="$(sed -n 's/^NEXT_PUBLIC_SUPABASE_URL=//p' .env.production | head -n1)"
            NEXT_PUBLIC_SUPABASE_ANON_KEY="$(sed -n 's/^NEXT_PUBLIC_SUPABASE_ANON_KEY=//p' .env.production | head -n1)"

            if [ -z "$API_GUARD_TOKEN" ]; then
              echo "API_GUARD_TOKEN not found in /data/cake/.env.production"
              exit 1
            fi

            if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
              echo "NEXT_PUBLIC_SUPABASE_URL not found in /data/cake/.env.production"
              exit 1
            fi

            if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY not found in /data/cake/.env.production"
              exit 1
            fi

            chmod +x source/scripts/deploy-remote.sh
            source/scripts/deploy-remote.sh \
              --mode build \
              --image-name "$IMAGE_NAME" \
              --image-tag "$IMAGE_TAG" \
              --workdir /data/cake \
              --compose-source /data/cake/source/docker-compose.yml \
              --source-dir /data/cake/source \
              --api-guard-token "$API_GUARD_TOKEN" \
              --supabase-url "$NEXT_PUBLIC_SUPABASE_URL" \
              --supabase-anon-key "$NEXT_PUBLIC_SUPABASE_ANON_KEY"

  # 3. 飞书通知
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/get-release-notes.js "${VERSION}" > /tmp/release_notes.md
          {
            echo 'notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send Feishu notification to message group
        env:
          MESSAGE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.MESSAGE_NOTIFICATION_WEBHOOK_URL }}
          MESSAGE_NOTIFICATION_WEBHOOK_SECRET: ${{ secrets.MESSAGE_NOTIFICATION_WEBHOOK_SECRET }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          set -euo pipefail

          if [ -z "${MESSAGE_NOTIFICATION_WEBHOOK_URL}" ]; then
            echo "MESSAGE_NOTIFICATION_WEBHOOK_URL is not configured" >&2
            exit 1
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RELEASE_TAG="${{ github.ref_name }}"
          export SHORT_SHA RELEASE_TAG

          node <<'NODE'
          const fs = require('fs');

          const success = process.env.DEPLOY_RESULT === 'success';
          const rawNotes = (process.env.RELEASE_NOTES || '').trim();
          const noteLines = rawNotes.split('\n');
          const releaseNotes =
            noteLines[0] && noteLines[0].startsWith('## ')
              ? noteLines.slice(2).join('\n').trim()
              : rawNotes;

          const repo = process.env.GITHUB_REPOSITORY;
          const server = process.env.GITHUB_SERVER_URL;
          const runId = process.env.GITHUB_RUN_ID;
          const sha = process.env.GITHUB_SHA;
          const shortSha = process.env.SHORT_SHA;
          const releaseTag = process.env.RELEASE_TAG;

          const title = success ? '🚀 版本发布成功' : '❌ 版本发布失败';
          const color = success ? 'green' : 'red';
          const statusLine = success
            ? '**状态**: 生产部署已完成'
            : '**状态**: 生产部署失败，请尽快处理';

          let content = [
            `**版本**: \`${releaseTag}\``,
            '**环境**: `production`',
            '**发布分支**: `master`',
            `**发布提交**: [${shortSha}](${server}/${repo}/commit/${sha})`,
            statusLine,
            `**查看详情**: [GitHub Actions](${server}/${repo}/actions/runs/${runId})`,
          ].join('\n');

          if (releaseNotes) {
            content += `\n\n### 版本说明\n${releaseNotes}`;
          }

          if (content.length > 3500) {
            content = `${content.slice(0, 3500)}\n\n...`;
          }

          const payload = {
            msg_type: 'interactive',
            card: {
              config: { wide_screen_mode: true },
              header: {
                title: { tag: 'plain_text', content: title },
                template: color,
              },
              elements: [
                {
                  tag: 'markdown',
                  content,
                },
                { tag: 'hr' },
                {
                  tag: 'div',
                  text: {
                    tag: 'lark_md',
                    content: '**请关注**: <at id=all></at>',
                  },
                },
              ],
            },
          };

          fs.writeFileSync('/tmp/feishu_payload.json', JSON.stringify(payload));
          NODE

          if [ -n "${MESSAGE_NOTIFICATION_WEBHOOK_SECRET}" ]; then
            TIMESTAMP=$(node -e "console.log(Math.floor(Date.now() / 1000))")
            SIGN=$(node -e 'const crypto=require("crypto"); const [timestamp, secret] = process.argv.slice(1); const hmac = crypto.createHmac("sha256", `${timestamp}\n${secret}`); hmac.update(Buffer.alloc(0)); console.log(hmac.digest("base64"));' "$TIMESTAMP" "$MESSAGE_NOTIFICATION_WEBHOOK_SECRET")
            TIMESTAMP="$TIMESTAMP" SIGN="$SIGN" node -e 'const fs=require("fs"); const payload=JSON.parse(fs.readFileSync("/tmp/feishu_payload.json","utf8")); payload.timestamp=process.env.TIMESTAMP; payload.sign=process.env.SIGN; fs.writeFileSync("/tmp/feishu_payload.json", JSON.stringify(payload));'
          fi

          curl -sS -X POST "${MESSAGE_NOTIFICATION_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data @/tmp/feishu_payload.json
