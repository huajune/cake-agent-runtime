name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }} # 可选
          script: |
            # 确保目标目录存在
            mkdir -p /opt/wecom-service
            cd /opt/wecom-service
            
            # 登录 GHCR (使用临时 Token)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 我们直接在远程写入一个简单的 docker-compose.yml (或者你可以手动维护一个更复杂的)
            # 这里为了自动化，我们动态生成一个指向最新镜像的 compose 文件
            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              wecom-service:
                image: ghcr.io/${{ github.repository }}:latest
                container_name: wecom-service
                restart: always
                ports:
                  - "8080:8080"
                env_file:
                  - .env
                volumes:
                  - ./logs:/app/logs
                environment:
                  - NODE_ENV=production
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/agent/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                networks:
                  - app-network
            networks:
              app-network:
                driver: bridge
            EOF

            # 拉取镜像并重新启动
            docker compose pull
            docker compose up -d
            
            # 清理
            docker image prune -f
            docker logout ghcr.io
