name: Build and Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy, for example v5.2.0'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  # 1. 先跑测试，防止坏代码直接上线
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Build frontend (validation only)
        run: pnpm run build:web
        env:
          # This artifact is discarded; production deploy rebuilds from the release tag
          # with the real API_GUARD_TOKEN on the target server.
          API_GUARD_TOKEN: ci-placeholder-token

      - name: Build backend
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

  # 2. 服务器上拉取源码并构建部署
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="cake-agent-runtime"
            RELEASE_TAG="${{ env.RELEASE_TAG }}"
            IMAGE_TAG="$RELEASE_TAG"
            cd /data/cake

            if [ -d source/.git ]; then
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            else
              rm -rf source
              git clone --depth 1 https://github.com/${{ github.repository }}.git source
              cd source
              git fetch --depth 1 origin "refs/tags/${RELEASE_TAG}"
              git checkout --detach FETCH_HEAD
              cd ..
            fi

            API_GUARD_TOKEN="$(sed -n 's/^API_GUARD_TOKEN=//p' .env.production | head -n1)"
            NEXT_PUBLIC_SUPABASE_URL="$(sed -n 's/^NEXT_PUBLIC_SUPABASE_URL=//p' .env.production | head -n1)"
            NEXT_PUBLIC_SUPABASE_ANON_KEY="$(sed -n 's/^NEXT_PUBLIC_SUPABASE_ANON_KEY=//p' .env.production | head -n1)"

            if [ -z "$API_GUARD_TOKEN" ]; then
              echo "API_GUARD_TOKEN not found in /data/cake/.env.production"
              exit 1
            fi

            if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
              echo "NEXT_PUBLIC_SUPABASE_URL not found in /data/cake/.env.production"
              exit 1
            fi

            if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY not found in /data/cake/.env.production"
              exit 1
            fi

            chmod +x source/scripts/deploy-remote.sh
            source/scripts/deploy-remote.sh \
              --mode build \
              --image-name "$IMAGE_NAME" \
              --image-tag "$IMAGE_TAG" \
              --workdir /data/cake \
              --compose-source /data/cake/source/docker-compose.yml \
              --source-dir /data/cake/source \
              --api-guard-token "$API_GUARD_TOKEN" \
              --supabase-url "$NEXT_PUBLIC_SUPABASE_URL" \
              --supabase-anon-key "$NEXT_PUBLIC_SUPABASE_ANON_KEY"

  # 3. 飞书企微私域监控群通知
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${RELEASE_TAG#v}"
          if ! node scripts/get-release-notes.js "${VERSION}" > /tmp/release_notes.md; then
            echo "未能提取 v${VERSION} 的 CHANGELOG 发布说明，请查看 GitHub Actions 详情。" > /tmp/release_notes.md
          fi
          {
            echo 'notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send Feishu notification to private domain monitor group
        env:
          PRIVATE_CHAT_MONITOR_WEBHOOK_URL: ${{ secrets.PRIVATE_CHAT_MONITOR_WEBHOOK_URL }}
          PRIVATE_CHAT_MONITOR_WEBHOOK_SECRET: ${{ secrets.PRIVATE_CHAT_MONITOR_WEBHOOK_SECRET }}
          REQUIRE_DEPLOY_NOTIFICATION: 'true'
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_ENVIRONMENT: production
          DEPLOY_BRANCH: master
          DEPLOY_TRIGGER: GitHub Actions
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: node scripts/send-deploy-notification.js
