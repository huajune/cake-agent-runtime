name: Release PR Autofill

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    if: >
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'develop' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build release PR title/body
        run: |
          node scripts/build-release-pr-body.js \
            --base master \
            --head develop \
            --title-file /tmp/release-pr-title.txt \
            --body-file /tmp/release-pr-body.md

      - name: Update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          RELEASE_TITLE="$(cat /tmp/release-pr-title.txt)"
          gh pr edit "${PR_NUMBER}" \
            --title "${RELEASE_TITLE}" \
            --body-file /tmp/release-pr-body.md
