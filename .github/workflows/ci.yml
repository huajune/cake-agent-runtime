name: CI Checks

on:
  pull_request:
    branches:
      - develop
      - master
  # bot 用 GITHUB_TOKEN 推的分支不触发 pull_request 事件（GitHub 防递归），
  # required check "CI Checks" 会一直 pending、bot PR 无法合并。
  # version-changelog.yml 在创建/更新 bot PR 后用 workflow_dispatch 派发到
  # bot 分支，使检查落在 PR head SHA 上（v5.13.1 发版只能靠人工 close/reopen）。
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dispatch 模式下回报 commit status 需要
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint check
        run: pnpm run lint:check

      - name: Prettier check
        run: pnpm run format:check

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build:ci

      - name: Unit tests with coverage
        run: pnpm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # workflow_dispatch 产生的 check run 不会计入 ruleset 的必需检查
      # （实测：PR #281 head 上有同名成功 check run 仍 BLOCKED；statusCheckRollup
      # 只聚合 pull_request 系列事件的 suite）。这里改用 commit status 回报：
      # status 没有事件归属概念、由 github-actions app 创建（匹配 ruleset 的
      # integration_id），必然计入 required check "CI Checks"。
      - name: Report commit status for dispatch runs
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          STATE="failure"
          [ "${JOB_STATUS}" = "success" ] && STATE="success"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATE}" \
            -f context="CI Checks" \
            -f description="CI Checks (workflow_dispatch on $(echo "${GITHUB_REF_NAME}" | cut -c1-80))"
          echo "✅ 已回报 commit status: ${STATE} @ ${GITHUB_SHA}"
