services:
  cake-agent:
    image: cake-agent-runtime:latest
    container_name: cake-agent
    restart: always
    ports:
      - "${PORT:-8585}:${PORT:-8585}"
    env_file:
      - .env.prod
    volumes:
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(`http://localhost:${process.env.PORT||8585}/agent/health`).then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
