version: '3.8'

services:
  wecom-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: duliday-wecom-service:latest
    container_name: wecom-service
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    volumes:
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/agent/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

